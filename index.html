<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Website</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #1a1c1e; 
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px 0;
            gap: 20px;
        }
        h1 { margin: 0; color: #5865F2; }
        p { margin: 0 0 10px 0; color: #b9bbbe; }
        
        /* Clear, simple container box for your links */
        .steam-badge-box {
            display: block;
            background-color: #171a21;
            padding: 20px;
            border-radius: 8px;
            text-decoration: none;
            text-align: center;
            border: 1px solid #2a475e;
            width: 360px;
        }
        .steam-logo {
            width: 140px;
            display: block;
            margin: 0 auto 10px auto;
        }
        .steam-text {
            color: #66c0f4;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Space</h1>
    <p>This site is built completely by me from scratch.</p>

    <!-- 100% DIRECT DISCORD STATUS OVERVIEW FRAME -->
    <iframe src="https://cnrad.dev" width="400" height="220" frameborder="0"></iframe>

    <!-- 100% DIRECT STEAM REDIRECT BUTTON (NO MIDDLEMAN APP) -->
    <a href="https://steamcommunity.com" target="_blank" class="steam-badge-box">
        <img src="https://akamaihd.net" class="steam-logo" alt="Steam Logo">
        <div class="steam-text">View My Official Steam Profile ›</div>
    </a>

</body>
</html>
